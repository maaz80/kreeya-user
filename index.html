  <script>
    // Optimized analytics loading
    let scriptsLoaded = false;

    function injectScript(src, options = {}) {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = src;
        script.async = true;
        if (options.crossOrigin) script.crossOrigin = options.crossOrigin;
        script.onload = resolve;
        script.onerror = reject;
        document.body.appendChild(script);
      });
    }

    function loadAllAnalyticsAndAds() {
      if (scriptsLoaded) return;
      scriptsLoaded = true;

      // 1. Load GTM Base Immediately on interaction
      (function (w, d, s, l, i) {
        w[l] = w[l] || [];
        w[l].push({ 'gtm.start': new Date().getTime(), event: 'gtm.js' });
        var f = d.getElementsByTagName(s)[0],
          j = d.createElement(s),
          dl = l != 'dataLayer' ? '&l=' + l : '';
        j.async = true;
        j.src = 'https://www.googletagmanager.com/gtm.js?id=' + i + dl;
        f.parentNode.insertBefore(j, f);
      })(window, document, 'script', 'dataLayer', 'GTM-5TVLVVFF');

      // 2. Load Adsense & Meta Pixel after 1.5s delay
      setTimeout(() => {
        // Adsense
        injectScript("https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5296398606051524", { crossOrigin: "anonymous" });

        // Improved Meta Pixel Logic (Initialization + Loading)
        !function (f, b, e, v, n, t, s) {
          if (f.fbq) return; n = f.fbq = function () {
            n.callMethod ?
              n.callMethod.apply(n, arguments) : n.queue.push(arguments)
          };
          if (!f._fbq) f._fbq = n; n.push = n; n.loaded = !0; n.version = '2.0';
          n.queue = []; t = b.createElement(e); t.async = !0;
          t.src = v; s = b.getElementsByTagName(e)[0];
          s.parentNode.insertBefore(t, s)
        }(window, document, 'script',
          'https://connect.facebook.net/en_US/fbevents.js');

        fbq('init', '1659893741690531');
        fbq('track', 'PageView');
      }, 1500);
    }

    // Trigger on real user interaction only
    const interactionEvents = ['scroll', 'touchstart', 'click', 'mousemove'];
    interactionEvents.forEach(event => {
      window.addEventListener(event, loadAllAnalyticsAndAds, { once: true, passive: true });
    });
  </script>
